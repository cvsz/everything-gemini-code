name: Upstream Drift

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Check upstream drift
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Check upstream drift
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/upstream/check-upstream-drift.js
